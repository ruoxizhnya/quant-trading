<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Copilot - Quant Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e7e9ea; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ────────────────────────────────────────────── */
  .header { background: #16181c; border-bottom: 1px solid #2f3336; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 22px; }
  .logo-text { font-size: 16px; font-weight: 700; color: #e7e9ea; }
  .logo-text span { color: #1d9bf0; }
  .header-back { background: #212327; border: 1px solid #2f3336; border-radius: 8px; color: #e7e9ea; font-size: 12px; padding: 6px 14px; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: border-color 0.2s; }
  .header-back:hover { border-color: #1d9bf0; }
  .header-badge { font-size: 11px; background: #1d9bf020; color: #1d9bf0; border: 1px solid #1d9bf040; border-radius: 6px; padding: 3px 10px; }

  /* ── Chat Area ─────────────────────────────────────────── */
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; max-width: 860px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 16px; }

  .msg { display: flex; gap: 12px; animation: fadeIn 0.25s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .msg.user .msg-avatar { background: #1d9bf0; }
  .msg.ai .msg-avatar { background: #2f3336; }

  .msg-body { max-width: 72%; }
  .msg.user .msg-body { text-align: right; }
  .msg-bubble { background: #16181c; border: 1px solid #2f3336; border-radius: 14px; padding: 12px 16px; display: inline-block; text-align: left; }
  .msg.user .msg-bubble { background: #1d9bf0; border-color: #1d9bf0; }
  .msg-text { font-size: 14px; color: #e7e9ea; line-height: 1.6; word-break: break-word; }

  /* ── Code Block ─────────────────────────────────────────── */
  .code-wrap { position: relative; margin-top: 10px; }
  .code-header { background: #212327; border: 1px solid #2f3336; border-bottom: none; border-radius: 10px 10px 0 0; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
  .code-lang { color: #71767b; font-weight: 600; }
  .code-actions { display: flex; gap: 8px; }
  .code-btn { background: #2f3336; border: 1px solid #3d4449; border-radius: 6px; color: #e7e9ea; font-size: 11px; padding: 4px 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
  .code-btn:hover { background: #3d4449; border-color: #1d9bf0; color: #1d9bf0; }
  .code-btn.copied { background: #1d9bf020; border-color: #1d9bf0; color: #1d9bf0; }
  .code-block { background: #16181c; border: 1px solid #2f3336; border-radius: 0 0 10px 10px; padding: 14px 16px; overflow-x: auto; margin: 0; }
  .code-block code { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; color: #e7e9ea; line-height: 1.6; white-space: pre; }

  /* ── Suggestion Chips ───────────────────────────────────── */
  .suggests { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .sugg { background: #212327; border: 1px solid #2f3336; border-radius: 20px; color: #71767b; font-size: 12px; padding: 5px 12px; cursor: pointer; transition: all 0.2s; }
  .sugg:hover { border-color: #1d9bf0; color: #1d9bf0; background: #1d9bf008; }

  /* ── Thinking indicator ─────────────────────────────────── */
  .thinking { display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: #71767b; font-size: 13px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #71767b; animation: bounce 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* ── Input Area ─────────────────────────────────────────── */
  .input-area { background: #16181c; border-top: 1px solid #2f3336; padding: 16px 24px; }
  .input-wrap { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  .input-box { flex: 1; background: #212327; border: 1px solid #2f3336; border-radius: 14px; padding: 12px 16px; display: flex; align-items: flex-end; gap: 10px; transition: border-color 0.2s; }
  .input-box:focus-within { border-color: #1d9bf0; }
  .input-box textarea { flex: 1; background: none; border: none; color: #e7e9ea; font-size: 14px; resize: none; outline: none; line-height: 1.5; max-height: 120px; font-family: inherit; }
  .input-box textarea::placeholder { color: #71767b; }
  .send-btn { background: #1d9bf0; color: #fff; border: none; border-radius: 12px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; transition: background 0.2s; }
  .send-btn:hover { background: #1a8cd8; }
  .send-btn:disabled { background: #2f3336; cursor: not-allowed; }

  .input-hint { text-align: center; font-size: 11px; color: #3d4449; margin-top: 8px; max-width: 860px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<div class="header">
  <div class="header-left">
    <span class="logo">🤖</span>
    <span class="logo-text">Strategy <span>Copilot</span></span>
    <span class="header-badge">AI 生成</span>
  </div>
  <a href="dashboard.html" class="header-back">← 返回仪表盘</a>
</div>

<!-- ══════════ CHAT ══════════ -->
<div class="chat-area" id="chatArea">

  <!-- Welcome message -->
  <div class="msg ai">
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-bubble">
        <div class="msg-text">👋 你好！我是策略 Copilot，可以帮你用自然语言生成量化交易策略代码。</div>
        <div class="suggests">
          <span class="sugg" onclick="fillPrompt('写一个 RSI 均值回归策略，当 RSI 低于 30 时买入，高于 70 时卖出')">📉 RSI 均值回归</span>
          <span class="sugg" onclick="fillPrompt('写一个 MACD 金叉死叉策略')">MACD 交叉策略</span>
          <span class="sugg" onclick="fillPrompt('写一个布林带突破策略，股价上穿布林带上轨时买入')">布林带突破</span>
          <span class="sugg" onclick="fillPrompt('写一个双均线策略，MA5 上穿 MA20 金叉买入，下穿死叉卖出')">双均线策略</span>
          <span class="sugg" onclick="fillPrompt('写一个海龟交易策略，基于 N 倍 ATR 止损')">海龟交易法</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ══════════ INPUT ══════════ -->
<div class="input-area">
  <div class="input-wrap">
    <div class="input-box">
      <textarea id="msgInput" rows="1" placeholder="描述你想要实现的策略，例如：写一个基于 RSI 的均值回归策略..." onkeydown="onKeyDown(event)" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
  <div class="input-hint">按 Enter 发送，Shift + Enter 换行 · 代码将自动保存到 generated_strategies/ 目录</div>
</div>

<script>
const API = 'http://localhost:8085';
const chatArea = document.getElementById('chatArea');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

let isGenerating = false;

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function fillPrompt(text) {
  input.value = text;
  autoGrow(input);
  input.focus();
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? '👤' : '🤖';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">
        <div class="msg-text">${escapeHtml(text)}</div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

function addCodeBlock(code, strategyName, description) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-bubble">
        ${description ? `<div class="msg-text" style="margin-bottom:8px">${escapeHtml(description)}</div>` : ''}
        <div class="code-wrap">
          <div class="code-header">
            <span class="code-lang">Go · ${escapeHtml(strategyName || 'strategy')}.go</span>
            <div class="code-actions">
              <button class="code-btn" id="copyBtn" onclick="copyCode(this, \`${escapeForJs(code)}\`)">📋 复制代码</button>
              <button class="code-btn" id="saveBtn" onclick="saveCode(this, \`${escapeForJs(code)}\`, \`${escapeForJs(strategyName || 'strategy')}\`)">💾 保存到策略</button>
            </div>
          </div>
          <pre class="code-block"><code>${escapeHtml(code)}</code></pre>
        </div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'thinking-msg';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-bubble">
        <div class="thinking">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <span>正在生成策略代码...</span>
        </div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;')
    .replace(/\n/g, '<br>');
}

function escapeForJs(str) {
  return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$').replace(/"/g, '\\"');
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isGenerating) return;

  isGenerating = true;
  sendBtn.disabled = true;

  // Add user message
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // Show thinking
  addThinking();

  try {
    const resp = await fetch(API + '/api/copilot/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text }),
    });

    removeThinking();

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: '请求失败' }));
      addMessage('ai', '❌ 生成失败：' + (err.error || err.message || '未知错误'));
      return;
    }

    const data = await resp.json();
    addCodeBlock(data.code || '', data.strategy_name || 'strategy', data.description || '');
  } catch (e) {
    removeThinking();
    addMessage('ai', '❌ 网络错误：' + e.message);
  } finally {
    isGenerating = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

async function copyCode(btn, code) {
  try {
    // code was escaped for JS, need to unescape for clipboard
    const unescaped = code.replace(/\\n/g, '\n').replace(/\\&amp;/g, '&').replace(/\\&lt;/g, '<').replace(/\\&gt;/g, '>').replace(/\\&quot;/g, '"');
    await navigator.clipboard.writeText(unescaped);
    btn.classList.add('copied');
    btn.textContent = '✅ 已复制';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋 复制代码';
    }, 2000);
  } catch (e) {
    btn.textContent = '❌ 复制失败';
    setTimeout(() => { btn.textContent = '📋 复制代码'; }, 2000);
  }
}

async function saveCode(btn, code, name) {
  try {
    const unescaped = code.replace(/\\n/g, '\n').replace(/\\&amp;/g, '&').replace(/\\&lt;/g, '<').replace(/\\&gt;/g, '>').replace(/\\&quot;/g, '"');
    const resp = await fetch(API + '/api/copilot/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: unescaped, strategy_name: name }),
    });
    const data = await resp.json();
    if (resp.ok) {
      btn.classList.add('copied');
      btn.textContent = '✅ 已保存';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = '💾 保存到策略';
      }, 2000);
    } else {
      btn.textContent = '❌ ' + (data.error || '保存失败');
      setTimeout(() => { btn.textContent = '💾 保存到策略'; }, 2000);
    }
  } catch (e) {
    btn.textContent = '❌ ' + e.message;
    setTimeout(() => { btn.textContent = '💾 保存到策略'; }, 2000);
  }
}
</script>
</body>
</html>
