<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Lab - 回测引擎</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e7e9ea; min-height: 100vh; }
  
  .header { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 24px; } .logo-text { font-size: 18px; font-weight: 600; color: #60a5fa; }
  
  .main { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 57px); }
  
  .sidebar { background: #1a1f2e; border-right: 1px solid #2d3748; padding: 16px; overflow-y: auto; }
  .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #60a5fa; margin: 14px 0 8px; }
  
  .form-group { margin-bottom: 10px; }
  label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
  input, select { width: 100%; padding: 7px 9px; background: #0f1419; border: 1px solid #2d3748; border-radius: 5px; color: #e7e9ea; font-size: 12px; }
  input:focus, select:focus { outline: none; border-color: #60a5fa; }
  
  .btn { width: 100%; padding: 9px; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; background: #60a5fa; color: #0f1419; }
  .btn:hover { background: #93c5fd; }
  .btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
  
  .content { padding: 16px; overflow-y: auto; }
  
  .status { display: none; align-items: center; gap: 8px; padding: 8px 12px; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }
  .status.show { display: flex; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #fbbf24; animation: spin 1s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .metrics { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .metric { background: #0f1419; border-radius: 5px; padding: 10px 6px; text-align: center; }
  .metric-value { font-size: 18px; font-weight: 700; color: #60a5fa; }
  .metric-value.positive { color: #34d399; }
  .metric-value.negative { color: #f87171; }
  .metric-label { font-size: 9px; color: #475569; margin-top: 2px; text-transform: uppercase; }
  
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  .chart-box { background: #0f1419; border-radius: 6px; overflow: hidden; }
  canvas { display: block; }
  
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: #475569; font-weight: 500; text-transform: uppercase; font-size: 9px; padding: 7px 8px; text-align: left; border-bottom: 1px solid #1f2937; }
  td { padding: 7px 8px; border-bottom: 1px solid #1a1f2e; color: #94a3b8; }
  tbody tr:hover td { background: #1f2937; }
  .sym { color: #60a5fa; font-weight: 600; }
  .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; }
  .badge-long { background: #064e3b; color: #34d399; }
  .badge-short { background: #7f1d1d; color: #f87171; }
  .badge-close { background: #1e3a5f; color: #60a5fa; }
  .pnl-pos { color: #34d399; }
  .pnl-neg { color: #f87171; }
  
  .empty-state { text-align: center; padding: 60px; color: #374151; font-size: 13px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  
  .hist-item { padding: 7px 0; border-bottom: 1px solid #1f2937; cursor: pointer; font-size: 11px; color: #64748b; }
  .hist-item:hover { color: #60a5fa; }
  .hist-date { font-size: 10px; color: #374151; margin-top: 1px; }
  
  .toast { position: fixed; bottom: 16px; right: 16px; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px; padding: 10px 16px; font-size: 12px; z-index: 1000; opacity: 0; transform: translateY(20px); transition: all 0.2s; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: #f87171; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">📈</span>
  <span class="logo-text">Quant Lab</span>
  <a href="dashboard.html" style="margin-left:16px;color:#60a5fa;text-decoration:none;font-size:13px;font-weight:600;border-left:1px solid #2d3748;padding-left:16px">‹ 控制台</a>
</div>

<div class="main">
  <div class="sidebar">
    <div class="section-title">策略配置</div>
    
    <div class="form-group"><label>策略</label>
      <select id="s-strategy">
        <option value="momentum">动量策略 (Momentum)</option>
        <option value="mean_reversion">均值回归 (Mean Reversion)</option>
      </select>
    </div>
    <div id="strategy-params" class="form-group" style="display:none;">
      <label>策略参数</label>
      <div id="param-container"></div>
    </div>
    <div class="form-group"><label>股票池</label>
      <input id="s-pool" value="600000.SH" placeholder="600000.SH">
    </div>
    <div class="form-group"><label>开始日期</label>
      <input type="date" id="s-start" value="2024-01-01">
    </div>
    <div class="form-group"><label>结束日期</label>
      <input type="date" id="s-end" value="2024-06-30">
    </div>
    <div class="form-group"><label>初始资金</label>
      <input type="number" id="s-capital" value="1000000">
    </div>
    
    <div class="section-title">交易成本</div>
    <div class="form-group"><label>手续费率</label>
      <input type="number" id="s-comm" value="0.0003" step="0.0001">
    </div>
    <div class="form-group"><label>滑点率</label>
      <input type="number" id="s-slip" value="0.0001" step="0.0001">
    </div>
    
    <div style="margin-top: 12px;">
      <button class="btn" id="btn-run" onclick="runBt()">🚀 运行回测</button>
    </div>
    
    <div class="section-title" style="margin-top: 16px;">最近回测</div>
    <div id="hist-list"></div>
  </div>
  
  <div class="content">
    <div class="status" id="status">
      <div class="status-dot"></div>
      <span id="status-msg">运行中...</span>
    </div>
    
    <div id="empty" class="empty-state">
      <div class="empty-icon">📊</div>
      <div>配置参数，点击「运行回测」</div>
    </div>
    
    <div id="results" style="display:none">
      <!-- Metrics -->
      <div class="card">
        <div class="metrics">
          <div class="metric"><div class="metric-value" id="m-ret">-</div><div class="metric-label">总收益</div></div>
          <div class="metric"><div class="metric-value" id="m-ann">-</div><div class="metric-label">年化</div></div>
          <div class="metric"><div class="metric-value" id="m-shp">-</div><div class="metric-label">Sharpe</div></div>
          <div class="metric"><div class="metric-value negative" id="m-dd">-</div><div class="metric-label">最大回撤</div></div>
          <div class="metric"><div class="metric-value" id="m-clm">-</div><div class="metric-label">Calmar</div></div>
          <div class="metric"><div class="metric-value" id="m-n">-</div><div class="metric-label">交易数</div></div>
        </div>
      </div>
      
      <!-- Charts -->
      <div class="charts">
        <div class="card">
          <div class="card-title">📈 净值曲线</div>
          <div class="chart-box" style="height:240px">
            <canvas id="c-equity"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">🕯️ K线 + 交易点</div>
          <div class="chart-box" style="height:240px">
            <canvas id="c-kline"></canvas>
          </div>
        </div>
      </div>
      
      <!-- Trades -->
      <div class="card">
        <div class="card-title">📋 交易记录</div>
        <div style="max-height: 280px; overflow-y: auto;">
          <table>
            <thead><tr><th>日期</th><th>标的</th><th>方向</th><th>数量</th><th>价格</th><th>盈亏</th></tr></thead>
            <tbody id="tb-trades"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Load Chart.js first -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Date adapter -->
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

<script>
const API = 'http://localhost:8085';
let eqChart = null;
let klChart = null;

function $(id) { return document.getElementById(id); }
function toast(msg, err) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%';
}
function fmtN(n, d) { return n == null || isNaN(n) ? '-' : n.toFixed(d == null ? 0 : d); }

// ─── Backtest ────────────────────────────────────────────────
async function runBt() {
  const btn = $('btn-run');
  btn.disabled = true;
  $('status').classList.add('show');
  $('empty').style.display = 'none';
  $('results').style.display = 'none';

  const stocks = $('s-pool').value.split(',').map(s => s.trim()).filter(Boolean);
  const strategyParams = gatherStrategyParams();
  const req = {
    strategy: $('s-strategy').value,
    stock_pool: stocks,
    start_date: $('s-start').value,
    end_date: $('s-end').value,
    initial_capital: parseFloat($('s-capital').value),
    commission_rate: parseFloat($('s-comm').value),
    slippage_rate: parseFloat($('s-slip').value),
    strategy_params: strategyParams
  };

  try {
    $('status-msg').textContent = '运行回测中...';
    let r = await fetch(API + '/backtest', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(req)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    let d = await r.json();

    while (d.status === 'running' || d.status === 'pending') {
      await new Promise(r2 => setTimeout(r2, 600));
      r = await fetch(API + '/backtest/' + d.id + '/report');
      d = await r.json();
    }
    if (d.status === 'failed') throw new Error('回测失败');

    // Use data directly from response (no extra /report call needed)
    showResults(d, stocks);
    saveHist(d.id, req);

  } catch (e) {
    toast(e.message, true);
    $('empty').style.display = 'block';
  } finally {
    btn.disabled = false;
    setTimeout(() => $('status').classList.remove('show'), 400);
  }
}

// ─── Display ─────────────────────────────────────────────────
async function showResults(d, stocks) {
  $('results').style.display = 'block';

  // Metrics
  const ret = d.total_return || 0;
  $('m-ret').textContent = fmt(ret);
  $('m-ret').className = 'metric-value ' + (ret >= 0 ? 'positive' : 'negative');
  $('m-ann').textContent = fmt(d.annual_return);
  $('m-shp').textContent = fmtN(d.sharpe_ratio, 2);
  $('m-dd').textContent = fmt(d.max_drawdown);
  $('m-clm').textContent = fmtN(d.calmar_ratio, 2);
  $('m-n').textContent = d.total_trades || 0;

  // Equity curve
  await drawEquity(d.portfolio_values, d.initial_capital || 1000000);

  // K-line - derive symbol from trades if stock_pool not available
  // Fall back to form inputs for date inputs (for historical backtests where d.start_date may be missing)
  const sdRaw = (d.start_date || $('s-start').value || '').split('T')[0];
  const edRaw = (d.end_date || $('s-end').value || '').split('T')[0];
  const symbol = (stocks && stocks.length > 0) ? stocks[0]
               : (d.trades && d.trades.length > 0) ? d.trades[0].symbol : null;
  if (symbol) {
    await drawKLine(symbol, sdRaw, edRaw, d.trades);
  }

  // Trades table
  renderTrades(d.trades);
}

// ─── Equity Chart ─────────────────────────────────────────────
async function drawEquity(pv, initCap) {
  const canvas = $('c-equity');
  if (!pv || pv.length === 0) return;

  const labels = pv.map(v => v.date ? v.date.replace('T', ' ').slice(0, 10) : '');
  const vals = pv.map(v => v.total_value);
  const startVal = initCap || vals[0];
  const pct = vals.map(v => (v - startVal) / startVal);

  if (eqChart) { eqChart.destroy(); eqChart = null; }

  const ctx = canvas.getContext('2d');
  eqChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: pct,
        borderColor: pct[pct.length-1] >= 0 ? '#34d399' : '#f87171',
        backgroundColor: pct[pct.length-1] >= 0 ? 'rgba(52,211,153,0.06)' : 'rgba(248,113,113,0.06)',
        fill: true,
        tension: 0.15,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1a1f2e',
        borderColor: '#2d3748',
        borderWidth: 1,
        callbacks: {
          label: ctx => {
            const v = ctx.raw;
            const dv = startVal * (1 + v);
            return ' ' + (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%  ¥' + dv.toFixed(0);
          }
        }
      }},
      scales: {
        x: { grid: { color: '#1f2937' }, ticks: { color: '#475569', maxTicksLimit: 6, font: { size: 9 } } },
        y: { grid: { color: '#1f2937' }, ticks: { color: '#475569', font: { size: 9 }, callback: v => (v * 100).toFixed(1) + '%' } }
      }
    }
  });
}

// ─── K-Line Chart (Close Price + Trade Markers) ─────────────────
async function drawKLine(symbol, startDate, endDate, trades) {
  const canvas = $('c-kline');

  // Ensure canvas has explicit pixel dimensions matching its container
  function sizeCanvas() {
    const box = canvas.parentElement;
    if (box) {
      canvas.width = box.clientWidth;
      canvas.height = 240;
    }
  }
  sizeCanvas();
  new ResizeObserver(sizeCanvas).observe(canvas.parentElement);

  // Fetch OHLCV
  let ohlcv = [];
  try {
    const s = startDate.replace(/-/g, '');
    const e = endDate.replace(/-/g, '');
    const r = await fetch(API + '/ohlcv/' + symbol + '?start_date=' + s + '&end_date=' + e);
    if (r.ok) {
      const data = await r.json();
      ohlcv = data.ohlcv || [];
    }
  } catch (e) { console.error('OHLCV fetch failed', e); }

  if (klChart) { klChart.destroy(); klChart = null; }

  const ctx = canvas.getContext('2d');

  if (ohlcv.length === 0) {
    ctx.fillStyle = '#374151';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('K线数据暂不可用', canvas.width / 2, canvas.height / 2);
    return;
  }

  const labels = ohlcv.map(d => new Date(d.date));
  const closes = ohlcv.map(d => d.close);
  const highs = ohlcv.map(d => d.high);
  const lows = ohlcv.map(d => d.low);

  // Build trade price map: timestamp -> price for markers
  const tradePrices = {};
  (trades || []).forEach(t => {
    if (!t.timestamp) return;
    const key = new Date(t.timestamp).getTime();
    tradePrices[key] = { price: t.price, direction: t.direction };
  });

  // Determine color based on overall trend
  const trendUp = closes[closes.length - 1] >= closes[0];
  const lineColor = trendUp ? '#34d399' : '#f87171';

  const tradeMarkerPlugin = {
    id: 'tradeMarkers',
    afterDraw(chart) {
      const ctx2 = chart.ctx;
      const xAxis = chart.scales.x;
      const yAxis = chart.scales.y;
      (trades || []).forEach(t => {
        if (!t.timestamp) return;
        const xVal = new Date(t.timestamp).getTime();
        const x = xAxis.getPixelForValue(xVal);
        if (x < xAxis.left || x > xAxis.right) return;
        // Find the close price at that date for y placement
        const dateStr = t.timestamp.split('T')[0];
        const ohlcvRow = ohlcv.find(d => d.date && d.date.startsWith(dateStr));
        let y;
        if (ohlcvRow) {
          y = yAxis.getPixelForValue(ohlcvRow.close);
        } else {
          y = yAxis.top + 20;
        }
        const color = t.direction === 'long' ? '#34d399' : t.direction === 'short' ? '#f87171' : '#60a5fa';
        const label = t.direction === 'long' ? '▲' : t.direction === 'short' ? '▼' : '●';
        ctx2.fillStyle = color;
        ctx2.font = 'bold 12px sans-serif';
        ctx2.fillText(label, x - 5, y - 4);
      });
    }
  };

  try {
    klChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '收盘价',
            data: closes,
            borderColor: lineColor,
            backgroundColor: trendUp ? 'rgba(52,211,153,0.06)' : 'rgba(248,113,113,0.06)',
            fill: true,
            tension: 0.1,
            pointRadius: 0,
            borderWidth: 1.5,
            order: 2,
          },
          {
            label: '高低区间',
            data: highs.map((h, i) => ({ x: labels[i], y: [lows[i], h] })),
            borderColor: 'rgba(148,163,184,0.3)',
            backgroundColor: 'transparent',
            borderWidth: 1,
            pointRadius: 0,
            showLine: false,
            order: 3,
          }
        ]
      },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        animation: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1f2e',
            borderColor: '#2d3748',
            borderWidth: 1,
            callbacks: {
              title: ctx => {
                const d = ohlcv[ctx[0].dataIndex];
                return d ? d.date.split('T')[0] : '';
              },
              label: ctx => {
                if (ctx.datasetIndex === 1) return null;
                const d = ohlcv[ctx.dataIndex];
                if (!d) return '';
                return [
                  '收: ¥' + d.close.toFixed(2),
                  '开: ¥' + d.open.toFixed(2),
                  '高: ¥' + d.high.toFixed(2),
                  '低: ¥' + d.low.toFixed(2),
                ];
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            grid: { color: '#1f2937' },
            time: { unit: 'day', displayFormats: { day: 'MM/dd' } },
            ticks: { color: '#475569', maxTicksLimit: 6, font: { size: 9 } }
          },
          y: {
            grid: { color: '#1f2937' },
            ticks: { color: '#475569', font: { size: 9 }, callback: v => '¥' + v.toFixed(2) }
          }
        }
      },
      plugins: [tradeMarkerPlugin]
    });
  } catch (e) {
    console.error('K-line chart error', e);
    ctx.fillStyle = '#374151';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('K线渲染失败', canvas.width / 2, canvas.height / 2);
  }
}

// ─── Trades Table ─────────────────────────────────────────────
function renderTrades(trades) {
  const tb = $('tb-trades');
  if (!trades || trades.length === 0) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#374151;padding:30px">暂无交易记录</td></tr>';
    return;
  }
  tb.innerHTML = trades.map(t => {
    const dir = t.direction;
    const cls = dir === 'long' ? 'badge-long' : dir === 'short' ? 'badge-short' : 'badge-close';
    const txt = dir === 'long' ? '买入' : dir === 'short' ? '卖出' : '平仓';
    const pnl = t.pnl;
    const pnlCls = pnl > 0 ? 'pnl-pos' : pnl < 0 ? 'pnl-neg' : '';
    return '<tr>' +
      '<td>' + (t.timestamp ? t.timestamp.split('T')[0] : '-') + '</td>' +
      '<td class="sym">' + (t.symbol || '-') + '</td>' +
      '<td><span class="badge ' + cls + '">' + txt + '</span></td>' +
      '<td>' + fmtN(t.quantity, 0) + '</td>' +
      '<td>¥' + fmtN(t.price, 2) + '</td>' +
      '<td class="' + pnlCls + '">' + (pnl != null ? fmt(pnl) : '-') + '</td>' +
      '</tr>';
  }).join('');
}

// ─── History ──────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem('qbh') || '[]');
function saveHist(id, req) {
  history.unshift({ id, req, t: Date.now() });
  history = history.slice(0, 10);
  localStorage.setItem('qbh', JSON.stringify(history));
  renderHist();
}
function renderHist() {
  const el = $('hist-list');
  if (history.length === 0) { el.innerHTML = '<div style="font-size:11px;color:#374151">暂无</div>'; return; }
  el.innerHTML = history.map(h => {
    const d = new Date(h.t);
    const ds = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    return '<div class="hist-item" onclick="loadHist(\'' + h.id + '\')"><div>' + h.req.strategy + '</div><div class="hist-date">' + ds + '</div></div>';
  }).join('');
}
async function loadHist(id) {
  $('status').classList.add('show');
  $('status-msg').textContent = '加载中...';
  try {
    const r = await fetch(API + '/backtest/' + id + '/report');
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    showResults(d, d.stock_pool || []);
  } catch (e) { toast('加载失败: ' + e.message, true); }
  finally { $('status').classList.remove('show'); }
}

// ─── Strategy Loader ──────────────────────────────────────────
let strategyInfoCache = {};

async function loadStrategies() {
  try {
    const r = await fetch(API + '/api/strategies');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    strategyInfoCache = {};
    const sel = $('s-strategy');
    sel.innerHTML = '';
    for (const s of d.strategies || []) {
      strategyInfoCache[s.name] = s;
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.description || s.name;
      sel.appendChild(opt);
    }
    // Trigger param render for default selection
    sel.addEventListener('change', onStrategyChange);
    onStrategyChange();
  } catch (e) { console.error('Failed to load strategies', e); }
}

function onStrategyChange() {
  const sel = $('s-strategy');
  const name = sel.value;
  const info = strategyInfoCache[name];
  const container = $('param-container');
  const paramsDiv = $('strategy-params');
  if (!info || !info.parameters || info.parameters.length === 0) {
    paramsDiv.style.display = 'none';
    return;
  }
  paramsDiv.style.display = 'block';
  container.innerHTML = '';
  for (const p of info.parameters) {
    const div = document.createElement('div');
    div.style.marginBottom = '6px';
    const label = document.createElement('label');
    label.textContent = p.name + ' (' + (p.default !== undefined ? p.default : '') + ')';
    label.style.fontSize = '10px';
    div.appendChild(label);
    let input;
    if (p.type === 'bool') {
      input = document.createElement('input');
      input.type = 'checkbox';
      input.id = 'p-' + p.name;
      if (p.default === true) input.checked = true;
    } else if (p.type === 'int' || p.type === 'float') {
      input = document.createElement('input');
      input.type = 'number';
      input.id = 'p-' + p.name;
      input.value = p.default !== undefined ? p.default : '';
      if (p.min !== undefined) input.min = p.min;
      if (p.max !== undefined) input.max = p.max;
      if (p.type === 'float') input.step = '0.01';
    } else {
      input = document.createElement('input');
      input.type = 'text';
      input.id = 'p-' + p.name;
      input.value = p.default !== undefined ? p.default : '';
    }
    div.appendChild(input);
    container.appendChild(div);
  }
}

function gatherStrategyParams() {
  const params = {};
  const info = strategyInfoCache[$('s-strategy').value];
  if (!info || !info.parameters) return params;
  for (const p of info.parameters) {
    const el = $('p-' + p.name);
    if (!el) continue;
    if (p.type === 'bool') {
      params[p.name] = el.checked;
    } else if (p.type === 'int') {
      const v = parseInt(el.value);
      if (!isNaN(v)) params[p.name] = v;
    } else if (p.type === 'float') {
      const v = parseFloat(el.value);
      if (!isNaN(v)) params[p.name] = v;
    } else {
      params[p.name] = el.value;
    }
  }
  return params;
}

renderHist();
loadStrategies();
</script>
