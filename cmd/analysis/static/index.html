<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Lab - 回测引擎</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e7e9ea; min-height: 100vh; }
  
  .header { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 24px; } .logo-text { font-size: 18px; font-weight: 600; color: #60a5fa; }
  
  .main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 65px); }
  
  .sidebar { background: #1a1f2e; border-right: 1px solid #2d3748; padding: 20px; overflow-y: auto; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #60a5fa; margin: 20px 0 12px; }
  
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  input, select { width: 100%; padding: 10px 12px; background: #0f1419; border: 1px solid #2d3748; border-radius: 8px; color: #e7e9ea; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #60a5fa; }
  
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #60a5fa; color: #0f1419; } .btn-primary:hover { background: #93c5fd; }
  .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
  
  .content { padding: 24px; overflow-y: auto; }
  
  .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .card-title { font-size: 14px; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }
  
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .metric { background: #0f1419; border-radius: 8px; padding: 16px; text-align: center; }
  .metric-value { font-size: 24px; font-weight: 700; color: #60a5fa; }
  .metric-value.positive { color: #34d399; }
  .metric-value.negative { color: #f87171; }
  .metric-label { font-size: 11px; color: #64748b; margin-top: 4px; text-transform: uppercase; }
  
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px; border-bottom: 1px solid #2d3748; font-size: 13px; }
  th { color: #64748b; font-weight: 500; text-transform: uppercase; font-size: 11px; }
  tr:hover { background: #1f2937; }
  
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-long { background: #064e3b; color: #34d399; }
  .badge-short { background: #7f1d1d; color: #f87171; }
  .badge-close { background: #1e3a5f; color: #60a5fa; }
  
  #equity-chart { width: 100%; height: 300px; }
  
  .status { display: flex; align-items: center; gap: 8px; padding: 12px; background: #0f1419; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; }
  .status-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  .status-dot.error { background: #f87171; }
  
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  
  .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 16px 20px; font-size: 14px; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: #f87171; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">📈</span>
  <span class="logo-text">Quant Lab</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="section-title">策略配置</div>
    
    <div class="form-group">
      <label>策略</label>
      <select id="strategy">
        <option value="momentum">动量策略 (Momentum)</option>
        <option value="value_momentum">价值动量 (Value Momentum)</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>股票池（逗号分隔）</label>
      <input id="stock-pool" value="600000.SH, 000001.SZ" placeholder="600000.SH, 000001.SZ">
    </div>
    
    <div class="form-group">
      <label>开始日期</label>
      <input type="date" id="start-date" value="2024-01-01">
    </div>
    
    <div class="form-group">
      <label>结束日期</label>
      <input type="date" id="end-date" value="2024-06-30">
    </div>
    
    <div class="form-group">
      <label>初始资金</label>
      <input type="number" id="capital" value="1000000">
    </div>
    
    <div class="section-title">高级配置</div>
    
    <div class="form-group">
      <label>手续费率</label>
      <input type="number" id="commission" value="0.0003" step="0.0001">
    </div>
    
    <div class="form-group">
      <label>滑点率</label>
      <input type="number" id="slippage" value="0.0001" step="0.0001">
    </div>
    
    <button class="btn btn-primary" id="run-btn" onclick="runBacktest()">🚀 运行回测</button>
    
    <div class="section-title">最近回测</div>
    <div id="history-list" style="font-size: 12px; color: #64748b;"></div>
  </div>
  
  <div class="content">
    <div id="status-bar" class="status" style="display: none;">
      <div class="status-dot loading"></div>
      <span id="status-text">运行中...</span>
    </div>
    
    <div id="empty-state" class="empty-state">
      <div class="empty-state-icon">📊</div>
      <div>配置回测参数，点击"运行回测"开始</div>
    </div>
    
    <div id="results" style="display: none;">
      <div class="card">
        <div class="card-title">📈 收益概览</div>
        <div class="metrics-grid">
          <div class="metric">
            <div class="metric-value" id="total-return">-</div>
            <div class="metric-label">总收益率</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="annual-return">-</div>
            <div class="metric-label">年化收益率</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="sharpe">-</div>
            <div class="metric-label">Sharpe</div>
          </div>
          <div class="metric">
            <div class="metric-value negative" id="max-dd">-</div>
            <div class="metric-label">最大回撤</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="calmar">-</div>
            <div class="metric-label">Calmar</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="total-trades">-</div>
            <div class="metric-label">交易次数</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">📉 净值曲线</div>
        <canvas id="equity-chart"></canvas>
      </div>
      
      <div class="card">
        <div class="card-title">📋 交易记录</div>
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>标的</th>
              <th>方向</th>
              <th>数量</th>
              <th>价格</th>
              <th>盈亏</th>
            </tr>
          </thead>
          <tbody id="trades-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8085';

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(dec) + '%';
}

function fmtNum(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return n.toFixed(dec);
}

async function runBacktest() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status-bar');
  const empty = document.getElementById('empty-state');
  const results = document.getElementById('results');
  
  btn.disabled = true;
  status.style.display = 'flex';
  empty.style.display = 'none';
  results.style.display = 'none';
  document.getElementById('status-text').textContent = '运行回测中...';
  
  const stocks = document.getElementById('stock-pool').value.split(',').map(s => s.trim()).filter(Boolean);
  
  const req = {
    strategy: document.getElementById('strategy').value,
    stock_pool: stocks,
    start_date: document.getElementById('start-date').value,
    end_date: document.getElementById('end-date').value,
    initial_capital: parseFloat(document.getElementById('capital').value),
    commission_rate: parseFloat(document.getElementById('commission').value),
    slippage_rate: parseFloat(document.getElementById('slippage').value)
  };
  
  try {
    const r = await fetch(API + '/backtest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(req)
    });
    
    if (!r.ok) throw new Error('回测请求失败: ' + r.status);
    const data = await r.json();
    
    document.getElementById('status-text').textContent = '加载结果...';
    
    // Poll for completion
    let result = data;
    while (result.status === 'running' || result.status === 'pending') {
      await new Promise(r => setTimeout(r, 500));
      const r2 = await fetch(API + '/backtest/' + result.id + '/report');
      result = await r2.json();
    }
    
    if (result.status === 'failed') throw new Error('回测失败');
    
    displayResults(result);
    addToHistory(result.id, req);
    
  } catch (e) {
    showToast(e.message, true);
    status.style.display = 'none';
    empty.style.display = 'block';
  } finally {
    btn.disabled = false;
    setTimeout(() => status.style.display = 'none', 500);
  }
}

function displayResults(r) {
  document.getElementById('results').style.display = 'block';
  
  const ret = r.total_return || 0;
  document.getElementById('total-return').textContent = fmt(ret);
  document.getElementById('total-return').className = 'metric-value ' + (ret >= 0 ? 'positive' : 'negative');
  
  document.getElementById('annual-return').textContent = fmt(r.annual_return);
  document.getElementById('sharpe').textContent = fmtNum(r.sharpe_ratio, 2);
  document.getElementById('max-dd').textContent = fmt(r.max_drawdown);
  document.getElementById('calmar').textContent = fmtNum(r.calmar_ratio, 2);
  document.getElementById('total-trades').textContent = r.total_trades || 0;
  
  drawEquityCurve(r.portfolio_values);
  loadTrades(r.backtest_id || window.currentBacktestId);
}

async function loadTrades(backtestId) {
  if (!backtestId) return;
  window.currentBacktestId = backtestId;
  
  try {
    const r = await fetch(API + '/backtest/' + backtestId + '/trades');
    const data = await r.json();
    
    const tbody = document.getElementById('trades-body');
    if (!data.trades || data.trades.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b">暂无交易记录</td></tr>';
      return;
    }
    
    tbody.innerHTML = data.trades.slice(0, 50).map(t => {
      const dir = t.direction;
      const badgeClass = dir === 'long' ? 'badge-long' : dir === 'short' ? 'badge-short' : 'badge-close';
      const badgeText = dir === 'long' ? '买入' : dir === 'short' ? '卖出' : '平仓';
      return `<tr>
        <td>${t.timestamp ? t.timestamp.split('T')[0] : '-'}</td>
        <td>${t.symbol}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td>${fmtNum(t.quantity, 0)}</td>
        <td>¥${fmtNum(t.price, 2)}</td>
        <td>${t.pnl !== undefined ? fmt(t.pnl) : '-'}</td>
      </tr>`;
    }).join('');
  } catch (e) {
    console.error('Failed to load trades', e);
  }
}

function drawEquityCurve(values) {
  const canvas = document.getElementById('equity-chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  const pad = 40;
  
  if (!values || values.length === 0) {
    ctx.fillStyle = '#64748b';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w/2, h/2);
    return;
  }
  
  const vals = values.map(v => v.total_value);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  
  const startCap = values[0].total_value;
  const pct = vals.map(v => (v - startCap) / startCap);
  const minP = Math.min(...pct);
  const maxP = Math.max(...pct);
  const pctRange = Math.max(maxP - minP, 0.01);
  
  ctx.clearRect(0, 0, w, h);
  
  // Grid lines
  ctx.strokeStyle = '#2d3748';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad + (h - 2*pad) * i / 4;
    ctx.beginPath();
    ctx.moveTo(pad, y);
    ctx.lineTo(w - pad, y);
    ctx.stroke();
    
    const val = maxV - range * i / 4;
    ctx.fillStyle = '#64748b';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('¥' + (val/10000).toFixed(1) + 'w', pad - 5, y + 3);
  }
  
  // Equity line
  const isPositive = pct[pct.length-1] >= 0;
  ctx.strokeStyle = isPositive ? '#34d399' : '#f87171';
  ctx.lineWidth = 2;
  ctx.beginPath();
  
  pct.forEach((p, i) => {
    const x = pad + (w - 2*pad) * i / (pct.length - 1);
    const y = pad + (h - 2*pad) * (1 - (p - minP) / pctRange);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // Area fill
  ctx.lineTo(pad + (w - 2*pad), pad + (h - 2*pad));
  ctx.lineTo(pad, pad + (h - 2*pad));
  ctx.closePath();
  ctx.fillStyle = isPositive ? 'rgba(52,211,153,0.1)' : 'rgba(248,113,113,0.1)';
  ctx.fill();
  
  // Zero line
  const zeroY = pad + (h - 2*pad) * (1 - (0 - minP) / pctRange);
  ctx.strokeStyle = '#475569';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(pad, zeroY);
  ctx.lineTo(w - pad, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Labels
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(values[0].date ? values[0].date.split('T')[0] : '', pad, h - 10);
  ctx.textAlign = 'right';
  ctx.fillText(values[values.length-1].date ? values[values.length-1].date.split('T')[0] : '', w - pad, h - 10);
}

let history = JSON.parse(localStorage.getItem('backtest_history') || '[]');

function addToHistory(id, req) {
  const item = { id, req, time: new Date().toISOString() };
  history.unshift(item);
  history = history.slice(0, 10);
  localStorage.setItem('backtest_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = '<div style="color:#475569;font-size:12px">暂无历史记录</div>';
    return;
  }
  el.innerHTML = history.map(h => {
    const d = new Date(h.time);
    const date = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    const time = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    return `<div style="padding:8px 0;border-bottom:1px solid #2d3748;cursor:pointer" onclick="loadHistory('${h.id}')">
      <div style="color:#94a3b8">${h.req.strategy}</div>
      <div style="color:#64748b;font-size:11px">${date} ${time}</div>
    </div>`;
  }).join('');
}

async function loadHistory(id) {
  try {
    const r = await fetch(API + '/backtest/' + id + '/report');
    const data = await r.json();
    displayResults(data);
    window.currentBacktestId = id;
  } catch (e) {
    showToast('加载失败: ' + e.message, true);
  }
}

// Init
renderHistory();
</script>
</body>
</html>
