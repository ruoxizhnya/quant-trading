<!DOCTYPE html>
<!-- ⚠️ DEPRECATED: This legacy HTML page is superseded by the Vue 3 SPA. Do not modify. See ADR-011. -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategy Lab — Quant Trading</title>
  <link rel="stylesheet" href="/static/quant-theme.css">
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #e0e0e0;
      --muted: #888;
      --green: #4caf50;
      --red: #f44336;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      min-height: 100vh;
    }
    nav {
      background: var(--card);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--accent2);
    }
    nav .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
    nav a { color: var(--text); text-decoration: none; font-size: 14px; }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); font-weight: 600; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #fff; }

    .panel {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .panel-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    select, input[type="text"], input[type="number"], input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--accent2);
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 16px; }

    .param-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .param-row label { margin: 0; min-width: 80px; }
    .param-row input { flex: 1; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--accent2);
      color: var(--text);
    }

    #loading {
      display: none;
      margin: 24px 0;
      text-align: center;
      color: var(--muted);
    }
    #loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--accent2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric {
      background: var(--accent2);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .metric .value { font-size: 22px; font-weight: 700; color: #fff; }
    .metric .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .metric .value.pos { color: var(--green); }
    .metric .value.neg { color: var(--red); }

    #equity-chart {
      width: 100%;
      height: 240px;
      background: var(--accent2);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .job-status {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .job-status.pending { background: #1a3a5c; color: #64b5f6; }
    .job-status.running { background: #1a3a2c; color: #81c784; }
    .job-status.failed  { background: #3a1a1a; color: #e57373; }

    .nav-links { display: flex; gap: 20px; margin-left: auto; }
  </style>
</head>
<body>
<nav>
  <span class="logo">Quant Lab</span>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/strategy-selector.html" class="active">Strategy Lab</a>
  <a href="/copilot.html">Copilot</a>
  <div class="nav-links">
    <a href="/screen.html">Screener</a>
  </div>
</nav>

<div class="container">
  <h1>Strategy Lab</h1>

  <!-- Strategy Selection -->
  <div class="panel">
    <div class="panel-title">Strategy Configuration</div>
    <div class="row">
      <div class="field">
        <label>Strategy</label>
        <select id="strategy-select">
          <option value="">— Select strategy —</option>
        </select>
      </div>
      <div class="field">
        <label>Universe</label>
        <select id="universe-select">
          <option value="all">All Stocks</option>
          <option value="csi300">CSI 300</option>
          <option value="csi500">CSI 500</option>
          <option value="csi800">CSI 800</option>
        </select>
      </div>
    </div>
    <div class="row-3">
      <div class="field">
        <label>Start Date</label>
        <input type="date" id="start-date" value="2018-01-01">
      </div>
      <div class="field">
        <label>End Date</label>
        <input type="date" id="end-date" value="2023-01-01">
      </div>
      <div class="field" style="display:flex; align-items:flex-end;">
        <button id="run-btn" onclick="runBacktest()">Run Backtest</button>
      </div>
    </div>
  </div>

  <!-- Parameters Panel (populated dynamically) -->
  <div class="panel" id="params-panel" style="display:none;">
    <div class="panel-title">Strategy Parameters</div>
    <div id="param-fields"></div>
  </div>

  <!-- Loading State -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Starting backtest...</div>
  </div>

  <!-- Job Status -->
  <div id="job-status" class="job-status" style="display:none;"></div>

  <!-- Results -->
  <div id="results">
    <div class="panel">
      <div class="panel-title">Performance Metrics</div>
      <div class="metrics" id="metrics-grid"></div>
      <canvas id="equity-chart"></canvas>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';

let currentStrategies = [];
let currentJobId = null;
let pollInterval = null;

// ── Load strategies on page load ──────────────────────────────────────
async function loadStrategies() {
  try {
    const res = await fetch(`${API_BASE}/strategies`);
    const data = await res.json();
    currentStrategies = data.strategies || [];
    const sel = document.getElementById('strategy-select');
    currentStrategies.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = `${s.name} — ${s.description || ''}`;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error('Failed to load strategies:', e);
  }
}

document.getElementById('strategy-select').addEventListener('change', async (e) => {
  const id = e.target.value;
  const panel = document.getElementById('params-panel');
  const fields = document.getElementById('param-fields');
  fields.innerHTML = '';
  panel.style.display = 'none';

  if (!id) return;

  const strategy = currentStrategies.find(s => s.id === id);
  if (!strategy || !strategy.params || strategy.params.length === 0) return;

  panel.style.display = 'block';
  strategy.params.forEach(p => {
    const row = document.createElement('div');
    row.className = 'param-row';

    const label = document.createElement('label');
    label.textContent = p.name;
    row.appendChild(label);

    let input;
    if (p.type === 'int' || p.type === 'float') {
      input = document.createElement('input');
      input.type = 'number';
      input.step = p.type === 'float' ? '0.01' : '1';
      input.value = p.default ?? (p.type === 'float' ? '0.0' : '20');
      if (p.min !== undefined) input.min = p.min;
      if (p.max !== undefined) input.max = p.max;
      input.dataset.param = p.name;
    } else {
      input = document.createElement('input');
      input.type = 'text';
      input.value = p.default ?? '';
      input.dataset.param = p.name;
    }
    row.appendChild(input);
    fields.appendChild(row);
  });
});

// ── Build params object from form ──────────────────────────────────────
function buildParams() {
  const params = {};
  document.querySelectorAll('[data-param]').forEach(inp => {
    const v = inp.value;
    const p = currentStrategies
      .find(s => s.id === document.getElementById('strategy-select').value)
      ?.params?.find(p => p.name === inp.dataset.param);
    if (!p) return;
    if (p.type === 'int') params[inp.dataset.param] = parseInt(v, 10);
    else if (p.type === 'float') params[inp.dataset.param] = parseFloat(v);
    else params[inp.dataset.param] = v;
  });
  return params;
}

// ── Run backtest ────────────────────────────────────────────────────────
async function runBacktest() {
  const strategyId = document.getElementById('strategy-select').value;
  if (!strategyId) { alert('Please select a strategy'); return; }

  const universe = document.getElementById('universe-select').value;
  const startDate = document.getElementById('start-date').value;
  const endDate = document.getElementById('end-date').value;
  const params = buildParams();

  // Show loading
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('job-status').style.display = 'none';
  document.getElementById('loading-text').textContent = 'Starting backtest...';

  const payload = {
    strategy_id: strategyId,
    params,
    universe,
    start_date: startDate,
    end_date: endDate
  };

  try {
    const res = await fetch(`${API_BASE}/backtest`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Request failed');
    }

    const data = await res.json();
    currentJobId = data.job_id || data.id;

    showJobStatus('pending', `Job queued: ${currentJobId.slice(0, 8)}...`);
    document.getElementById('loading-text').textContent = 'Running backtest...';

    // Start polling
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(() => pollResults(currentJobId), 2000);

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showJobStatus('failed', `Error: ${e.message}`);
  }
}

// ── Poll for results ────────────────────────────────────────────────────
async function pollResults(jobId) {
  try {
    const res = await fetch(`${API_BASE}/backtest/${jobId}`);
    if (!res.ok) return;
    const data = await res.json();

    if (data.status === 'completed') {
      clearInterval(pollInterval);
      document.getElementById('loading').style.display = 'none';
      showJobStatus('running', 'Backtest complete ✓');
      displayResults(data.result || data);
    } else if (data.status === 'failed') {
      clearInterval(pollInterval);
      document.getElementById('loading').style.display = 'none';
      showJobStatus('failed', `Failed: ${data.error || 'Unknown error'}`);
    }
    // else pending/running — keep polling
  } catch(e) {
    clearInterval(pollInterval);
    document.getElementById('loading').style.display = 'none';
    showJobStatus('failed', `Poll error: ${e.message}`);
  }
}

// ── Display results ────────────────────────────────────────────────────
function displayResults(result) {
  const el = document.getElementById('results');
  el.style.display = 'block';

  // Metrics
  const m = result;
  const fmt = (v, isPct) => {
    if (v === undefined || v === null) return '—';
    if (isPct) return (v * 100).toFixed(2) + '%';
    return v.toFixed(3);
  };

  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric">
      <div class="value ${m.total_return >= 0 ? 'pos' : 'neg'}">${fmt(m.total_return, true)}</div>
      <div class="label">Total Return</div>
    </div>
    <div class="metric">
      <div class="value ${m.annual_return >= 0 ? 'pos' : 'neg'}">${fmt(m.annual_return, true)}</div>
      <div class="label">Annual Return</div>
    </div>
    <div class="metric">
      <div class="value">${fmt(m.sharpe_ratio ?? m.sharpe)}</div>
      <div class="label">Sharpe Ratio</div>
    </div>
    <div class="metric">
      <div class="value neg">${fmt(m.max_drawdown ?? m.maxDrawdown, true)}</div>
      <div class="label">Max Drawdown</div>
    </div>
    <div class="metric">
      <div class="value">${fmt(m.win_rate ?? m.winRate, true)}</div>
      <div class="label">Win Rate</div>
    </div>
    <div class="metric">
      <div class="value">${m.total_trades ?? m.totalTrades ?? '—'}</div>
      <div class="label">Total Trades</div>
    </div>
  `;

  // Equity curve
  const navSeries = m.nav_series || m.navSeries || [];
  drawEquityChart(navSeries);
}

// ── Draw equity curve ──────────────────────────────────────────────────
function drawEquityChart(series) {
  const canvas = document.getElementById('equity-chart');
  if (!canvas || series.length === 0) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  const vals = series.map(([_, v]) => v);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const pad = 16;
  const chartW = w - pad * 2;
  const chartH = h - pad * 2;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad + (chartH * i) / 4;
    ctx.beginPath();
    ctx.moveTo(pad, y);
    ctx.lineTo(w - pad, y);
    ctx.stroke();
  }

  // Curve
  if (series.length < 2) return;
  const xStep = chartW / (series.length - 1);
  const range = max - min || 1;

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad, 0, h - pad);
  grad.addColorStop(0, 'rgba(233,69,96,0.3)');
  grad.addColorStop(1, 'rgba(233,69,96,0.0)');

  ctx.beginPath();
  ctx.moveTo(pad, h - pad);
  series.forEach(([i, v], idx) => {
    const x = pad + idx * xStep;
    const y = h - pad - ((v - min) / range) * chartH;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(pad + (series.length - 1) * xStep, h - pad);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  series.forEach(([i, v], idx) => {
    const x = pad + idx * xStep;
    const y = h - pad - ((v - min) / range) * chartH;
    if (idx === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ── Job status helper ───────────────────────────────────────────────────
function showJobStatus(status, msg) {
  const el = document.getElementById('job-status');
  el.className = `job-status ${status}`;
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Init ────────────────────────────────────────────────────────────────
loadStrategies();
</script>
</body>
</html>
