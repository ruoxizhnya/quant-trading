<!DOCTYPE html>
<!-- ⚠️ DEPRECATED: This legacy HTML page is superseded by the Vue 3 SPA. Do not modify. See ADR-011. -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选股器 - 量化交易系统</title>
    <link rel="stylesheet" href="/static/quant-theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e7e9ea; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        header h1 { font-size: 24px; font-weight: 600; }
        nav { display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 1px solid #2f3336; padding-bottom: 16px; }
        nav a { color: #71767b; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; }
        nav a:hover { background: #1d9bf020; color: #1d9bf0; }
        nav a.active { color: #1d9bf0; font-weight: 600; }
        .filters { background: #16181c; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .filters h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #e7e9ea; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 12px; color: #71767b; font-weight: 500; }
        .filter-group input { background: #212327; border: 1px solid #2f3336; border-radius: 8px; padding: 10px 12px; color: #e7e9ea; font-size: 14px; width: 100%; }
        .filter-group input:focus { outline: none; border-color: #1d9bf0; }
        .filter-group select { background: #212327; border: 1px solid #2f3336; border-radius: 8px; padding: 10px 12px; color: #e7e9ea; font-size: 14px; width: 100%; }
        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        button { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #1d9bf0; color: #fff; }
        .btn-primary:hover { background: #1a8cd8; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #212327; color: #e7e9ea; border: 1px solid #2f3336; }
        .btn-secondary:hover { background: #2f3336; }
        .results { background: #16181c; border-radius: 16px; overflow: hidden; }
        .results-header { padding: 20px 24px; border-bottom: 1px solid #2f3336; display: flex; justify-content: space-between; align-items: center; }
        .results-header h2 { font-size: 16px; font-weight: 600; }
        .results-count { font-size: 14px; color: #71767b; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; color: #71767b; background: #212327; border-bottom: 1px solid #2f3336; }
        td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #2f3336; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #1d9bf010; }
        .stock-symbol { font-weight: 600; color: #1d9bf0; }
        .positive { color: #00c853; }
        .negative { color: #ff5252; }
        .loading { text-align: center; padding: 40px; color: #71767b; }
        .error { background: #2d1117; border: 1px solid #ff525240; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: #ff5252; font-size: 14px; }
        .empty { text-align: center; padding: 60px 20px; color: #71767b; }
        .factor-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; margin: 2px; }
        .factor-good { background: #00c85320; color: #00c853; }
        .factor-warn { background: #ff980020; color: #ff9800; }
        .info-row { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 选股器</h1>
        </header>
        <nav>
            <a href="dashboard.html">🏠 控制台</a>
            <a href="index.html">回测</a>
            <a href="screen.html" class="active">选股器</a>
        </nav>

        <div class="filters">
            <h2>筛选条件</h2>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>PE 上限</label>
                    <input type="number" id="pe_max" placeholder="例: 30" step="0.1">
                </div>
                <div class="filter-group">
                    <label>PB 上限</label>
                    <input type="number" id="pb_max" placeholder="例: 3" step="0.1">
                </div>
                <div class="filter-group">
                    <label>ROE 下限 (%)</label>
                    <input type="number" id="roe_min" placeholder="例: 10" step="0.1">
                </div>
                <div class="filter-group">
                    <label>ROA 下限 (%)</label>
                    <input type="number" id="roa_min" placeholder="例: 5" step="0.1">
                </div>
                <div class="filter-group">
                    <label>毛利率 下限 (%)</label>
                    <input type="number" id="gross_margin_min" placeholder="例: 30" step="0.1">
                </div>
                <div class="filter-group">
                    <label>净利润率 下限 (%)</label>
                    <input type="number" id="net_margin_min" placeholder="例: 10" step="0.1">
                </div>
                <div class="filter-group">
                    <label>市值 下限 (亿)</label>
                    <input type="number" id="market_cap_min" placeholder="例: 100" step="1">
                </div>
                <div class="filter-group">
                    <label>最多返回</label>
                    <select id="limit">
                        <option value="10">10 只</option>
                        <option value="20">20 只</option>
                        <option value="50" selected>50 只</option>
                        <option value="100">100 只</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn-primary" id="screenBtn" onclick="doScreen()">🔍 开始选股</button>
                <button class="btn-secondary" onclick="resetFilters()">重置</button>
            </div>
        </div>

        <div id="errorBox" style="display:none" class="error"></div>

        <div class="results" id="resultsBox" style="display:none">
            <div class="results-header">
                <h2>筛选结果</h2>
                <span class="results-count" id="resultCount"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>股票代码</th>
                        <th>PE (市盈率)</th>
                        <th>PB (市净率)</th>
                        <th>ROE (%)</th>
                        <th>ROA (%)</th>
                        <th>毛利率 (%)</th>
                        <th>净利润率 (%)</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>

        <div class="empty" id="emptyBox" style="display:none">
            <p>暂无数据，请调整筛选条件后重试</p>
        </div>

        <div class="loading" id="loadingBox" style="display:none">
            <p>选股中...</p>
        </div>
    </div>

    <script>
        const API = '';  // Use relative URL (same origin as the page)

        async function doScreen() {
            const btn = document.getElementById('screenBtn');
            btn.disabled = true;
            btn.textContent = '选股中...';

            hideAll();
            document.getElementById('loadingBox').style.display = 'block';

            const filters = {};
            const peMax = document.getElementById('pe_max').value;
            const pbMax = document.getElementById('pb_max').value;
            const roeMin = document.getElementById('roe_min').value;
            const roaMin = document.getElementById('roa_min').value;
            const gmMin = document.getElementById('gross_margin_min').value;
            const nmMin = document.getElementById('net_margin_min').value;
            const mcMin = document.getElementById('market_cap_min').value;
            const limit = parseInt(document.getElementById('limit').value);

            if (peMax) filters.pe_max = parseFloat(peMax);
            if (pbMax) filters.pb_max = parseFloat(pbMax);
            if (roeMin) filters.roe_min = parseFloat(roeMin) / 100;
            if (roaMin) filters.roa_min = parseFloat(roaMin) / 100;
            if (gmMin) filters.gross_margin_min = parseFloat(gmMin) / 100;
            if (nmMin) filters.net_margin_min = parseFloat(nmMin) / 100;
            if (mcMin) filters.market_cap_min = parseFloat(mcMin) * 1e8;

            try {
                const resp = await fetch(API + '/screen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filters, limit })
                });
                const data = await resp.json();

                hideAll();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                if (!data.results || data.results.length === 0) {
                    document.getElementById('emptyBox').style.display = 'block';
                    return;
                }

                renderResults(data.results);
                document.getElementById('resultsBox').style.display = 'block';
                document.getElementById('resultCount').textContent = data.count + ' 只股票';

            } catch (e) {
                hideAll();
                showError('请求失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 开始选股';
            }
        }

        function renderResults(results) {
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';

            for (const r of results) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="stock-symbol">${r.ts_code}</td>
                    <td class="${r.pe !== null && r.pe < 20 ? 'positive' : r.pe !== null && r.pe > 50 ? 'negative' : ''}">${fmt(r.pe)}</td>
                    <td class="${r.pb !== null && r.pb < 3 ? 'positive' : r.pb !== null && r.pb > 8 ? 'negative' : ''}">${fmt(r.pb)}</td>
                    <td class="${r.roe !== null && r.roe > 0.15 ? 'positive' : r.roe !== null && r.roe < 0.05 ? 'negative' : ''}">${pct(r.roe)}</td>
                    <td class="${r.roa !== null && r.roa > 0.08 ? 'positive' : r.roa !== null && r.roa < 0.03 ? 'negative' : ''}">${pct(r.roa)}</td>
                    <td>${pct(r.gross_margin)}</td>
                    <td>${pct(r.net_margin)}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function fmt(v) {
            if (v === null || v === undefined) return '-';
            return v.toFixed(2);
        }

        function pct(v) {
            if (v === null || v === undefined) return '-';
            return (v * 100).toFixed(2);
        }

        function showError(msg) {
            const el = document.getElementById('errorBox');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideAll() {
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loadingBox').style.display = 'none';
            document.getElementById('resultsBox').style.display = 'none';
            document.getElementById('emptyBox').style.display = 'none';
        }

        function resetFilters() {
            document.querySelectorAll('.filters input').forEach(i => i.value = '');
            document.getElementById('limit').value = '50';
            hideAll();
        }
    </script>
</body>
</html>
