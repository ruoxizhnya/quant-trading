apiVersion: v1
kind: ConfigMap
metadata:
  name: quant-trading-config
  namespace: quant-trading
  labels:
    app.kubernetes.io/name: quant-trading
    app.kubernetes.io/part-of: quant-trading
data:
  # Service ports (per AGENTS.md service topology)
  ANALYSIS_PORT: "8085"
  DATA_PORT: "8081"
  AI_PORT: "8086"
  # Database (PostgreSQL)
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "quantlab"
  POSTGRES_USER: "quantlab"
  # Cache (Redis)
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  # Gin mode
  GIN_MODE: "release"
