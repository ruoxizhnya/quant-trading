logging:
  level: "info"
  format: "json"

server:
  host: "0.0.0.0"
  port: 8081

database:
  host: "postgres"
  port: 5432
  user: "postgres"
  password: "${DATABASE_PASSWORD}"
  database: "quant_trading"
  sslmode: "disable"

redis:
  url: "redis://redis:6379"

tushare:
  token: "${TUSHARE_TOKEN}"
  base_url: "https://api.tushare.pro"
  max_retries: 3
