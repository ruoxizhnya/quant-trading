server:
  host: "0.0.0.0"
  port: 8085

database:
  url: "postgres://postgres:${DATABASE_PASSWORD}@postgres:5432/quant_trading?sslmode=disable"
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${DATABASE_PASSWORD}"
  database: "quant_trading"
  sslmode: "disable"

redis:
  url: "redis://redis:6379"

data_service:
  url: "http://data-service:8081"

strategy_service:
  url: "http://strategy-service:8082"

# P1-15 (Sprint 6, ODR-021): risk + execution services merged into
# analysis service. The `risk_service.url` and the
# `STRATEGY_SERVICE_URL` env on docker-compose still work for backward
# compat (in case someone deploys a separate risk service), but the
# canonical runtime is in-process — `risk_manager` and `trading`
# sections below are the single source of truth.
risk_service:
  url: "http://localhost:8085"  # legacy fallback only

# In-process risk manager config (absorbed from risk-service.yaml).
# Used by the backtest engine via WithRiskManager(rm) so all risk
# computations (position sizing / regime detection / stop loss) run
# without an HTTP hop.
risk_manager:
  target_volatility: 0.15
  max_position_weight: 0.10
  min_position_weight: 0.01
  stoploss:
    atr_period: 14
    base_multiplier: 2.5
    bull_multiplier: 2.0
    bear_multiplier: 3.5
    sideways_multiplier: 2.5
  take_profit:
    atr_multiplier: 3.0
  volatility:
    lookback_days: 20
    annualization_factor: 16.0
  regime:
    fast_ma_period: 10
    slow_ma_period: 20
    vol_lookback: 60

# ── AlertManager + PeriodicAlertLoop (P2 alert, ODR-025) ──────────
#
# The 6 P0 risk rules evaluate the live portfolio on every tick
# of the periodic loop (default 5min). Alerts are dispatched to:
#   1. LogChannel (always-on, structured zerolog)
#   2. WebhookChannel (when webhook_url is set)
#   3. RecorderChannel (in-process ring buffer for /api/alerts/history)
#
# A 0 or empty value disables the corresponding rule. The
# defaults below mirror ODR-023's recommended production values.
alert:
  enabled: true
  interval_sec: 300           # 5min between evaluations
  history_limit: 100          # ring buffer for /api/alerts/history
  recorder_capacity: 100      # recorder channel capacity
  max_position_weight: 0.20   # single position > 20% of portfolio
  max_sector_weight: 0.40     # single sector > 40% of portfolio
  max_drawdown: 0.15          # peak-to-trough drawdown > 15%
  daily_loss_limit: -50000    # daily P&L < -50k
  failure_rate_limit: 0.10    # order failure rate > 10% in 1h
  webhook_url: ""             # empty = webhook disabled
  webhook_timeout_sec: 5

backtest:
  initial_capital: 1000000.0
  commission_rate: 0.0003
  slippage_rate: 0.0001
  risk_free_rate: 0.03

# Sprint 6 P0-4 (ODR-013): AI Copilot sandbox Stage 1
#
# `working_dir` is the directory `go build` runs in when compiling
# LLM-generated strategy code. It MUST contain a `go.mod` that
# resolves `github.com/ruoxizhnya/quant-trading/pkg/domain`. Empty
# value = service refuses to build any generated strategy (fails
# closed with status="sandbox_rejected").
#
# Production: point this at the deployed repo root, e.g.
#   working_dir: "/opt/quant-trading"
# CI:  working_dir: "/Users/runner/work/quant-trading/quant-trading"
# Local dev: working_dir: ""   (then the API will return sandbox_rejected
#   and the operator will see a clear error in the response body)
copilot:
  working_dir: ""

# A-share trading rules
trading:
  stamp_tax_rate: 0.001          # 印花税 0.1%
  min_commission: 5.0            # 最低佣金 5元
  transfer_fee_rate: 0.00001     # 过户费 0.001%
  price_limit:
    normal: 0.10                 # 普通股票涨跌幅限制 ±10%
    st: 0.05                     # ST股票涨跌幅限制 ±5%
    new: 0.20                    # 新股涨跌幅限制 ±20%
  new_stock_days: 60             # 新股判断阈值（上市60天内）

logging:
  level: "info"
  format: "json"

# Data Source Adapter Configuration (Phase 3)
datasource:
  primary: "http"
  fallback: ""
  cache:
    ohlcv_ttl: "24h"
    fundamental_ttl: "6h"
    stocks_ttl: "1h"
    calendar_ttl: "24h"
    prefix: "md:"
    redis_url: ""                # set to enable Redis cache (e.g. "redis:6379")
  sources:
    http:
      type: "http"
      url: "http://data-service:8081"
    tushare:
      type: "tushare"
      url: "http://tushare.pro"
      token: "${TUSHARE_TOKEN}"
    postgres:
      type: "postgres"           # requires PostgresStore injection at init
    akshare:
      type: "akshare"
      python_path: "python3"
      script_dir: "./scripts"
    inmemory:
      type: "inmemory"           # for testing only
