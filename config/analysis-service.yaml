server:
  host: "0.0.0.0"
  port: 8085

database:
  url: "postgres://postgres:${DATABASE_PASSWORD}@postgres:5432/quant_trading?sslmode=disable"
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${DATABASE_PASSWORD}"
  database: "quant_trading"
  sslmode: "disable"

redis:
  url: "redis://redis:6379"

data_service:
  url: "http://data-service:8081"

strategy_service:
  url: "http://strategy-service:8082"

risk_service:
  url: "http://risk-service:8083"

backtest:
  initial_capital: 1000000.0
  commission_rate: 0.0003
  slippage_rate: 0.0001
  risk_free_rate: 0.03

# Sprint 6 P0-4 (ODR-013): AI Copilot sandbox Stage 1
#
# `working_dir` is the directory `go build` runs in when compiling
# LLM-generated strategy code. It MUST contain a `go.mod` that
# resolves `github.com/ruoxizhnya/quant-trading/pkg/domain`. Empty
# value = service refuses to build any generated strategy (fails
# closed with status="sandbox_rejected").
#
# Production: point this at the deployed repo root, e.g.
#   working_dir: "/opt/quant-trading"
# CI:  working_dir: "/Users/runner/work/quant-trading/quant-trading"
# Local dev: working_dir: ""   (then the API will return sandbox_rejected
#   and the operator will see a clear error in the response body)
copilot:
  working_dir: ""

# A-share trading rules
trading:
  stamp_tax_rate: 0.001          # 印花税 0.1%
  min_commission: 5.0            # 最低佣金 5元
  transfer_fee_rate: 0.00001     # 过户费 0.001%
  price_limit:
    normal: 0.10                 # 普通股票涨跌幅限制 ±10%
    st: 0.05                     # ST股票涨跌幅限制 ±5%
    new: 0.20                    # 新股涨跌幅限制 ±20%
  new_stock_days: 60             # 新股判断阈值（上市60天内）

logging:
  level: "info"
  format: "json"

# Data Source Adapter Configuration (Phase 3)
datasource:
  primary: "http"
  fallback: ""
  cache:
    ohlcv_ttl: "24h"
    fundamental_ttl: "6h"
    stocks_ttl: "1h"
    calendar_ttl: "24h"
    prefix: "md:"
    redis_url: ""                # set to enable Redis cache (e.g. "redis:6379")
  sources:
    http:
      type: "http"
      url: "http://data-service:8081"
    tushare:
      type: "tushare"
      url: "http://tushare.pro"
      token: "${TUSHARE_TOKEN}"
    postgres:
      type: "postgres"           # requires PostgresStore injection at init
    akshare:
      type: "akshare"
      python_path: "python3"
      script_dir: "./scripts"
    inmemory:
      type: "inmemory"           # for testing only
